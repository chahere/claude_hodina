security:
  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

  providers:
    app_customer_provider:
      entity:
        class: App\Entity\Customer
        property: email

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    main:
      lazy: true
      provider: app_customer_provider

      # ✅ Authenticator (Symfony 6.2+ / 8.x)
      # (le singulier "custom_authenticator" peut être ignoré selon la version)
      custom_authenticators:
        - App\Security\AppAuthenticator

      logout:
        path: app_logout
        target: app_home

      remember_me:
        secret: '%kernel.secret%'
        lifetime: 604800
        path: /

  access_control:
    # Backoffice : admin only
    - { path: ^/ouegnewe, roles: ROLE_ADMIN }

    # Dashboard livreur Djama : livreurs authentifiés uniquement
    - { path: ^/djama, roles: ROLE_COURIER }

    # Portail client : clients authentifiés uniquement
    - { path: ^/mon-compte, roles: ROLE_USER }

    # Routes publiques
    - { path: ^/hodi, roles: PUBLIC_ACCESS }
    - { path: ^/caribou, roles: PUBLIC_ACCESS }
    - { path: ^/lawa, roles: PUBLIC_ACCESS }

    # Home (public)
    - { path: ^/, roles: PUBLIC_ACCESS }
  
